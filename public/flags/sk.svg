<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 60 30">
  <!-- fundal: alb, albastru, roșu (3 benzi orizontale egale) -->
  <rect width="60" height="30" fill="#ffffff"/>
  <rect y="10" width="60" height="10" fill="#0B4EA2"/>
  <rect y="20" width="60" height="10" fill="#EE1C25"/>

  <!-- scutul slovac, stilizat -->
  <!-- contur alb al scutului -->
  <path d="M10 7
           Q 16 6 22 7
           L 22 18
           Q 16 23 10 18
           Z"
        fill="#ffffff"/>

  <!-- interior roșu al scutului -->
  <path d="M11 8
           Q 16 7.2 21 8
           L 21 17.2
           Q 16 21.5 11 17.2
           Z"
        fill="#EE1C25"/>

  <!-- crucea dublă albă -->
  <!-- stâlpul crucii -->
  <rect x="15.3" y="9.2" width="1.4" height="7.5" fill="#ffffff"/>
  <!-- brațul superior -->
  <rect x="13.2" y="10.4" width="5.6" height="1.2" fill="#ffffff"/>
  <!-- brațul inferior -->
  <rect x="13.2" y="12.6" width="5.6" height="1.2" fill="#ffffff"/>

  <!-- cele trei coline albastre -->
  <path d="M12 17.2
           Q 14 15.5 16 17.2
           Q 18 15.2 20 17.2
           Q 16 19.8 12 17.2
           Z"
        fill="#0B4EA2"/>
</svg>
